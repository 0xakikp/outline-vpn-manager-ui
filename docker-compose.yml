services:
  outline-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: outline-manager
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      - PORT=3002
      - ALLOWED_ORIGIN=https://outline.akikp.in
    networks:
      - outline-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  outline-net:
    driver: bridge
